      border: none;
      padding: 10px;
      margin-top: 10px;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

  <div class="container">

    <div class="beat">
      <h3>Veigh x Vulgo FK x Kayblack Type Beat - "Copo Cheio"</h3>
      <audio controls>
        <source src="copo-cheio.mp3" type="audio/mpeg">
      </audio>
      <p>R$ 100</p>
      <button onclick="comprar()">Comprar</button>
    </div>

    <div class="beat">
      <h3>Veigh x HoodTrap Type Beat - "Lollipop"</h3>
      <audio controls>
        <source src="Lollipop.mp3" type="audio/mpeg">
      </audio>

      <button onclick="comprar()">Comprar</button>
    </div>

  </div>

  <script>
    function comprar() {
      window.open("https://wa.me/11983176113");

</body>
</html>
